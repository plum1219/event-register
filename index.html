<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>イベントレジ 試作版</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="app-header">
    <div>
      <p class="eyebrow">Doujin Event Register</p>
      <h1>イベントレジ 試作版</h1>
      <p class="lead">頒布物の在庫・売上・取り置きをブラウザだけで管理するためのたたき台です。</p>
    </div>
    <div class="header-actions">
      <button id="exportBtn" class="secondary">データを書き出し</button>
      <label class="import-label">
        データを読み込み
        <input id="importFile" type="file" accept="application/json">
      </label>
      <button id="resetBtn" class="danger">リセット</button>
    </div>
  </header>

  <main class="layout">
    <section class="panel">
      <div class="panel-head">
        <h2>サークル設定</h2>
      </div>
      <div class="form-grid">
        <label>
          サークル名
          <input id="circleName" type="text" placeholder="例：わくわく同人屋さん">
        </label>
        <label>
          イベント名
          <input id="eventName" type="text" placeholder="例：COMIC CITY">
        </label>
        <label>
          スペース番号
          <input id="spaceNo" type="text" placeholder="例：東1 A-12a">
        </label>
      </div>
    </section>

    <section class="panel">
      <div class="panel-head">
        <h2>商品登録</h2>
      </div>
      <form id="itemForm" class="form-grid">
        <label>
          商品名
          <input id="itemName" type="text" required placeholder="例：新刊セット">
        </label>
        <label>
          価格
          <input id="itemPrice" type="number" min="0" step="50" required placeholder="500">
        </label>
        <label>
          通常頒布在庫
          <input id="itemStock" type="number" min="0" step="1" required placeholder="30">
        </label>
        <label>
          通販用に残す部数
          <input id="itemReserveMail" type="number" min="0" step="1" value="0">
        </label>
        <label>
          アイコン
          <select id="itemIcon">
            <option value="📘">📘 本</option>
            <option value="🎁">🎁 セット</option>
            <option value="🖼️">🖼️ ポストカード</option>
            <option value="✨">✨ グッズ</option>
            <option value="🧸">🧸 ぬい</option>
            <option value="📦">📦 その他</option>
          </select>
        </label>
        <button type="submit" class="primary">商品を追加</button>
      </form>
    </section>

    <section class="stats-grid">
      <article class="stat">
        <span>売上合計</span>
        <strong id="totalSales">¥0</strong>
      </article>
      <article class="stat">
        <span>販売数</span>
        <strong id="totalSold">0</strong>
      </article>
      <article class="stat">
        <span>未告知の完売</span>
        <strong id="unsentSoldout">0</strong>
      </article>
      <article class="stat">
        <span>未受け渡し取り置き</span>
        <strong id="pendingReservations">0</strong>
      </article>
    </section>

    <section class="panel">
      <div class="panel-head">
        <h2>レジ</h2>
        <p>「+1」で販売、「戻す」で誤タップを取り消せます。</p>
      </div>
      <div id="items" class="items"></div>
    </section>

    <section class="panel">
      <div class="panel-head">
        <h2>取り置きリスト</h2>
        <p>受け渡し済みにするとグレーアウトして下に移動します。</p>
      </div>
      <form id="reservationForm" class="reservation-form">
        <input id="resName" type="text" required placeholder="お名前 / X ID">
        <select id="resItem" required></select>
        <input id="resQty" type="number" min="1" step="1" value="1" required>
        <button class="primary" type="submit">追加</button>
      </form>
      <div id="reservations" class="reservations"></div>
    </section>
  </main>

  <div id="toast" class="toast hidden"></div>

  <dialog id="soldoutDialog">
    <form method="dialog" class="dialog-card">
      <h2>完売しました</h2>
      <p id="soldoutText"></p>
      <textarea id="tweetText" rows="5"></textarea>
      <div class="dialog-actions">
        <button id="tweetBtn" value="tweet" class="primary">告知する</button>
        <button id="laterBtn" value="later" class="secondary">後にする</button>
        <button id="noTweetBtn" value="no" class="secondary">告知しない</button>
      </div>
    </form>
  </dialog>

  <script src="app.js"></script>
</body>
</html>
